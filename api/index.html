<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    #chatbox {
      max-height: 250px;
      overflow-y: auto;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #eee;
      border-radius: 8px;
      background: #fafafa;
    }

    .msg {
      margin: 8px 0;
      padding: 8px 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #4f46e5;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
      color: black;
      margin-right: auto;
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- 🔒 Login -->
  <div id="login">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error" class="error"></p>
  </div>

  <!-- 🤖 Chat -->
  <div id="chat" style="display:none;">
    <h2>🤖 AI Chatbot</h2>

    <div id="chatbox"></div>

    <input type="text" id="message" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
